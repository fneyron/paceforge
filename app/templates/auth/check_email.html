{% extends "base.html" %}
{% block title %}Vérifie ton email — PaceForge{% endblock %}
{% block content_public %}
<div class="min-h-screen bg-white flex items-center justify-center px-4">
    <div class="w-full max-w-sm text-center">
        <a href="/"><img src="/static/img/logo.svg" alt="PaceForge" class="w-12 h-12 mx-auto mb-6"></a>
        <div class="w-16 h-16 rounded-2xl bg-gray-100 flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-gray-600" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 01-2.25 2.25h-15a2.25 2.25 0 01-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25m19.5 0v.243a2.25 2.25 0 01-1.07 1.916l-7.5 4.615a2.25 2.25 0 01-2.36 0L3.32 8.91a2.25 2.25 0 01-1.07-1.916V6.75"/>
            </svg>
        </div>
        <h1 class="text-xl font-bold text-gray-900 mb-2">Vérifie ta boîte mail</h1>
        <p class="text-sm text-gray-500 leading-relaxed">
            Un email de confirmation a été envoyé.<br>
            Clique sur le lien pour activer ton compte.
        </p>
        <p class="mt-6 text-xs text-gray-400">Pense à vérifier les spams.</p>
    </div>
</div>
{% endblock %}
