{% extends "base.html" %}
{% block title %}Nouveau mot de passe — PaceForge{% endblock %}
{% block content_public %}
<div class="min-h-screen bg-white flex items-center justify-center px-4">
    <div class="w-full max-w-sm">
        <div class="text-center mb-8">
            <a href="/"><img src="/static/img/logo.svg" alt="PaceForge" class="w-12 h-12 mx-auto mb-4"></a>
            <h1 class="text-2xl font-bold text-gray-900">Nouveau mot de passe</h1>
        </div>

        {% if error %}
        <div class="mb-4 rounded-xl border border-red-200 bg-red-50 px-4 py-3 text-sm text-red-700">{{ error }}</div>
        {% endif %}

        <form method="POST" action="/auth/reset-password" class="space-y-4">
            <input type="hidden" name="token" value="{{ token }}">
            <div>
                <label for="password" class="block text-xs font-medium text-gray-500 mb-1">Nouveau mot de passe</label>
                <input type="password" name="password" id="password" required minlength="8"
                       placeholder="8 caractères minimum"
                       class="w-full h-11 px-4 rounded-xl border border-gray-300 text-sm focus:border-gray-900 focus:ring-1 focus:ring-gray-900 outline-none">
            </div>
            <button type="submit"
                    class="w-full h-11 rounded-xl bg-gray-900 hover:bg-gray-800 text-white font-semibold text-sm transition-colors">
                Enregistrer
            </button>
        </form>
    </div>
</div>
{% endblock %}
