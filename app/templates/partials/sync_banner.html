{% if sync_in_progress %}
<div id="sync-banner"
     hx-get="/partials/sync-status"
     hx-trigger="every 5s"
     hx-swap="outerHTML"
     class="rounded-xl border border-blue-200 bg-blue-50 px-4 py-3 flex items-center gap-3">
    <svg class="animate-spin h-4 w-4 text-blue-500 shrink-0" viewBox="0 0 24 24">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
    </svg>
    <div>
        <p class="text-sm font-medium text-blue-900">Synchronisation en cours...</p>
        <p class="text-xs text-blue-600">Import de vos 6 derniers mois d'activités depuis Strava. Cette page se mettra à jour automatiquement.</p>
    </div>
</div>
{% endif %}
