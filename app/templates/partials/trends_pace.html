{% if pace_labels %}
<div data-pace-labels="{{ pace_labels | tojson }}"
     data-pace-data="{{ pace_data | tojson }}"
     data-is-cycling="{{ 'true' if is_cycling is defined and is_cycling else 'false' }}">
    <div id="paceChartApex" style="min-height: 220px;"></div>
</div>
{% else %}
<p class="text-sm text-gray-400 py-8 text-center">Pas assez de donnees pour ce sport.</p>
{% endif %}
