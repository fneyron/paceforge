{% for activity in activities %}
    {% include "partials/activity_row.html" %}
{% endfor %}

{% if has_more %}
<div hx-swap-oob="true" id="load-more">
    <div class="mt-6 text-center">
        <button
            hx-get="/partials/activities?page={{ page + 1 }}"
            hx-target="#activity-list"
            hx-swap="beforeend"
            hx-indicator="#load-spinner"
            class="px-6 py-2 bg-white border border-gray-300 rounded-lg text-sm text-gray-700 hover:bg-gray-50 transition-colors">
            Charger plus
            <span id="load-spinner" class="htmx-indicator ml-2">
                <svg class="animate-spin h-4 w-4 inline" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
                </svg>
            </span>
        </button>
    </div>
</div>
{% else %}
<div hx-swap-oob="true" id="load-more"></div>
{% endif %}
